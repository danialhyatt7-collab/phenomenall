<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 680" role="img" aria-label="I'd rather be someone's shot of whiskey than everyone's cup of tea">
  <defs>
    <style>
      .ink { fill:#111; }
      .serif { font-family: "Playfair Display", Georgia, serif; font-weight:800; }
      .script { font-family: "Pinyon Script", "Brush Script MT", cursive; }
      .small { font-family: "Playfair Display", Georgia, serif; font-weight:700; }
    </style>
  </defs>

  <!-- Outer ornamental frame -->
  <g class="ink" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round">
    <path d="M70 120 q-18 -40 22 -52 q-44 26 -10 64" />
    <path d="M450 120 q18 -40 -22 -52 q44 26 10 64" />
    <path d="M70 560 q-18 40 22 52 q-44 -26 -10 -64" />
    <path d="M450 560 q18 40 -22 52 q44 -26 10 -64" />
    <path d="M96 130 C 96 360, 96 360, 96 550" stroke-width="2"/>
    <path d="M424 130 C 424 360, 424 360, 424 550" stroke-width="2"/>
    <path d="M110 120 q150 -22 300 0" stroke-width="2"/>
    <path d="M110 560 q150 22 300 0" stroke-width="2"/>
    <path d="M150 100 q-30 -10 -42 16 M370 100 q30 -10 42 16" stroke-width="2"/>
  </g>

  <!-- Top text -->
  <text x="260" y="180" text-anchor="middle" class="serif ink" font-size="46" letter-spacing="1">I&#8217;D RATHER BE</text>
  <text x="260" y="232" text-anchor="middle" class="serif ink" font-size="50" letter-spacing="1">SOMEONE&#8217;S</text>

  <!-- Oval emblem -->
  <g>
    <ellipse cx="260" cy="320" rx="120" ry="64" fill="none" stroke="#111" stroke-width="3"/>
    <ellipse cx="260" cy="320" rx="108" ry="54" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="2 5"/>
    <text x="260" y="300" text-anchor="middle" class="small ink" font-size="30" letter-spacing="2">SHOT</text>
    <text x="260" y="328" text-anchor="middle" class="small ink" font-size="22" letter-spacing="2">OF</text>
    <text x="260" y="358" text-anchor="middle" class="small ink" font-size="30" letter-spacing="3">WHISKEY</text>
  </g>

  <!-- Bottom text -->
  <text x="260" y="450" text-anchor="middle" class="serif ink" font-size="44" letter-spacing="2">THAN</text>
  <text x="260" y="510" text-anchor="middle" class="script ink" font-size="66">Everyone&#8217;s</text>
  <text x="260" y="556" text-anchor="middle" class="serif ink" font-size="46" letter-spacing="2">CUP OF TEA</text>
</svg>
